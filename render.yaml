services:
  - type: web
    name: ethershare-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:socketio_app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
